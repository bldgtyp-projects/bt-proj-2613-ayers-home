name: Deploy to Cloudflare Pages

# Per-project deploy delegates to the reusable workflow in the template repo.
# All build/validate/retry/deploy logic lives in ONE place:
# bldgtyp/bt-web-report-template/.github/workflows/_renderer-build.yml
#
# Refs are pinned to explicit SHAs at seed time; `btwr pin` advances them.
# Schemas comes from public npm — no BLDGTYP_PACKAGES_TOKEN required.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    uses: bldgtyp/bt-web-report-template/.github/workflows/_renderer-build.yml@dbe09633ec41fda92ed43fe672d72af473a82ead
    with:
      project-repo: ${{ github.repository }}
      project-ref: ${{ github.ref }}
      renderer-ref: dbe09633ec41fda92ed43fe672d72af473a82ead
      schemas-ref: 7146f2a8f444a59b7d9cc816694534f35235a5f5
      run-deploy: true
      cloudflare-pages-project: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_OTP_IDP_ID: ${{ secrets.CLOUDFLARE_ACCESS_OTP_IDP_ID }}
